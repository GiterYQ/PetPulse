openapi: 3.1.0
info:
  title: PetPulse MVP API
  version: 0.1.0
  summary: PetPulse 宠物急救互助 MVP API 契约草案
  description: >
    PetPulse MVP API 覆盖账号、宠物档案、求助、匹配、提醒、响应、媒体和基础后台。
    本契约用于前后端和移动端对齐，不代表已实现的生产接口。
servers:
  - url: http://localhost:3000/v1
    description: 本地开发占位
  - url: https://api.petpulse.example/v1
    description: 生产环境占位
tags:
  - name: Config
    description: 启动配置、地区策略和功能开关
  - name: Auth
    description: 会话和当前用户
  - name: Devices
    description: 设备和通知 token
  - name: Pets
    description: 宠物档案
  - name: Emergencies
    description: 急救和走失求助
  - name: Matching
    description: 匹配候选
  - name: Alerts
    description: 提醒发送和查看
  - name: Responses
    description: 帮助者响应
  - name: Media
    description: 媒体上传和对象存储元数据
  - name: Admin
    description: 最小后台能力
security:
  - bearerAuth: []
paths:
  /config/bootstrap:
    get:
      tags: [Config]
      summary: 获取启动配置
      description: 返回地区策略、Provider、功能开关和本地化资源版本。
      operationId: getBootstrapConfig
      security: []
      parameters:
        - $ref: "#/components/parameters/Platform"
        - $ref: "#/components/parameters/AppVersion"
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Region"
      responses:
        "200":
          description: 启动配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapConfigResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /auth/session:
    post:
      tags: [Auth]
      summary: 创建或恢复会话
      description: MVP 可使用 mock provider，正式版本再替换为邮箱、手机号、Apple、Google 或微信等登录方式。
      operationId: createSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: 会话已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /me:
    get:
      tags: [Auth]
      summary: 获取当前用户
      operationId: getCurrentUser
      responses:
        "200":
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Auth]
      summary: 更新当前用户
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 用户已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Auth]
      summary: 删除账号或发起删除流程
      operationId: deleteCurrentUser
      responses:
        "204":
          description: 删除流程已处理
        default:
          $ref: "#/components/responses/ErrorResponse"

  /devices:
    post:
      tags: [Devices]
      summary: 注册设备 token
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceRequest"
      responses:
        "201":
          description: 设备已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTokenResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /devices/{deviceId}:
    delete:
      tags: [Devices]
      summary: 注销设备 token
      operationId: deleteDevice
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "204":
          description: 设备已注销
        default:
          $ref: "#/components/responses/ErrorResponse"

  /pets:
    get:
      tags: [Pets]
      summary: 获取我的宠物列表
      operationId: listPets
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 宠物列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Pets]
      summary: 创建宠物
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: 宠物已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /pets/{petId}:
    get:
      tags: [Pets]
      summary: 获取宠物详情
      operationId: getPet
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "200":
          description: 宠物详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Pets]
      summary: 更新宠物
      operationId: updatePet
      parameters:
        - $ref: "#/components/parameters/PetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePetRequest"
      responses:
        "200":
          description: 宠物已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Pets]
      summary: 删除宠物
      operationId: deletePet
      parameters:
        - $ref: "#/components/parameters/PetId"
      responses:
        "204":
          description: 宠物已删除
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies:
    get:
      tags: [Emergencies]
      summary: 获取我的求助列表
      operationId: listEmergencies
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmergencyStatus"
      responses:
        "200":
          description: 求助列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Emergencies]
      summary: 创建求助草稿或直接提交
      operationId: createEmergency
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmergencyRequest"
      responses:
        "201":
          description: 求助已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}:
    get:
      tags: [Emergencies]
      summary: 获取求助详情
      operationId: getEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
      responses:
        "200":
          description: 求助详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Emergencies]
      summary: 更新求助草稿或允许修改字段
      operationId: updateEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmergencyRequest"
      responses:
        "200":
          description: 求助已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/submit:
    post:
      tags: [Emergencies]
      summary: 提交求助并进入匹配
      operationId: submitEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 求助已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/close:
    post:
      tags: [Emergencies]
      summary: 关闭或标记求助已解决
      operationId: closeEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseEmergencyRequest"
      responses:
        "200":
          description: 求助已关闭
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/matches:
    get:
      tags: [Matching]
      summary: 获取求助匹配候选
      operationId: listEmergencyMatches
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
      responses:
        "200":
          description: 匹配候选列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchCandidateListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/rematch:
    post:
      tags: [Matching]
      summary: 重新匹配候选
      description: MVP 可后置，当前先保留契约占位。
      operationId: rematchEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: 重新匹配已接受
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/alerts:
    get:
      tags: [Alerts]
      summary: 查看求助提醒发送记录
      operationId: listEmergencyAlerts
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 提醒发送记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertDeliveryListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Alerts]
      summary: 向选定候选发送提醒
      operationId: createEmergencyAlerts
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertsRequest"
      responses:
        "201":
          description: 提醒已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertDeliveryListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /alerts/{alertId}/view:
    post:
      tags: [Alerts]
      summary: 标记提醒已查看
      operationId: markAlertViewed
      parameters:
        - $ref: "#/components/parameters/AlertId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 提醒已查看
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertDeliveryResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /alerts/{alertId}/responses:
    post:
      tags: [Responses]
      summary: 提交响应
      operationId: createAlertResponse
      parameters:
        - $ref: "#/components/parameters/AlertId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResponseRequest"
      responses:
        "201":
          description: 响应已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /emergencies/{emergencyId}/responses:
    get:
      tags: [Responses]
      summary: 查看求助响应
      operationId: listEmergencyResponses
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 求助响应列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /media/presign:
    post:
      tags: [Media]
      summary: 获取媒体上传 URL
      operationId: createMediaPresign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaPresignRequest"
      responses:
        "201":
          description: 上传 URL 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaPresignResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /media/{mediaId}/complete:
    post:
      tags: [Media]
      summary: 标记媒体上传完成
      operationId: completeMediaUpload
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 媒体已激活
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /media/{mediaId}:
    delete:
      tags: [Media]
      summary: 删除媒体
      operationId: deleteMedia
      parameters:
        - $ref: "#/components/parameters/MediaId"
      responses:
        "204":
          description: 媒体已删除
        default:
          $ref: "#/components/responses/ErrorResponse"

  /admin/emergencies:
    get:
      tags: [Admin]
      summary: 后台求助列表
      operationId: adminListEmergencies
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmergencyStatus"
      responses:
        "200":
          description: 后台求助列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /admin/emergencies/{emergencyId}:
    get:
      tags: [Admin]
      summary: 后台求助详情
      operationId: adminGetEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
      responses:
        "200":
          description: 后台求助详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /admin/emergencies/{emergencyId}/hide:
    post:
      tags: [Admin]
      summary: 隐藏求助
      operationId: adminHideEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
      responses:
        "200":
          description: 求助已隐藏
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /admin/emergencies/{emergencyId}/restore:
    post:
      tags: [Admin]
      summary: 恢复求助
      operationId: adminRestoreEmergency
      parameters:
        - $ref: "#/components/parameters/EmergencyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
      responses:
        "200":
          description: 求助已恢复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /admin/metrics:
    get:
      tags: [Admin]
      summary: 获取聚合运营指标
      operationId: adminGetMetrics
      responses:
        "200":
          description: 聚合运营指标
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMetricsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Platform:
      name: platform
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Platform"
    AppVersion:
      name: appVersion
      in: query
      required: false
      schema:
        type: string
        example: "0.1.0"
    Locale:
      name: locale
      in: query
      required: false
      schema:
        type: string
        example: zh-CN
    Region:
      name: region
      in: query
      required: false
      schema:
        type: string
        example: CN
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
    PetId:
      name: petId
      in: path
      required: true
      schema:
        type: string
    EmergencyId:
      name: emergencyId
      in: path
      required: true
      schema:
        type: string
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string

  responses:
    ErrorResponse:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ApiEnvelope:
      type: object
      required: [meta]
      properties:
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
          example: req_01HX0000000000000000000000
        timestamp:
          type: string
          format: date-time
    Pagination:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
        hasMore:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
    ApiError:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        requestId:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string
    ErrorCode:
      type: string
      enum:
        - UNAUTHENTICATED
        - FORBIDDEN
        - VALIDATION_ERROR
        - NOT_FOUND
        - FEATURE_DISABLED
        - REGION_UNSUPPORTED
        - RATE_LIMITED
        - PROVIDER_ERROR
        - CONFLICT

    Platform:
      type: string
      enum: [ios, android, web]
    AuthProvider:
      type: string
      enum: [mock, email, phone, apple, google, wechat]
    UserStatus:
      type: string
      enum: [active, disabled, deleted]
    PetType:
      type: string
      enum: [dog, cat, other]
    PetStatus:
      type: string
      enum: [active, deleted]
    EmergencyType:
      type: string
      enum: [medical_emergency, lost_pet]
    EmergencyStatus:
      type: string
      enum: [draft, submitted, matching, alerting, active, resolved, closed, hidden]
    EmergencyUrgency:
      type: string
      enum: [low, medium, high, critical]
    ContactPreference:
      type: string
      enum: [in_app, masked_phone, manual]
    CloseReason:
      type: string
      enum: [resolved, offline, user_closed, admin_hidden]
    CandidateType:
      type: string
      enum: [user, pet, hospital, volunteer, manual]
    MatchCandidateStatus:
      type: string
      enum: [suggested, selected, alerted, dismissed]
    AlertChannel:
      type: string
      enum: [push, sms, email, in_app, mock]
    AlertStatus:
      type: string
      enum: [pending, sent, viewed, responded, declined, expired, failed]
    ResponseType:
      type: string
      enum: [can_help, lead, decline, report]
    ResponseStatus:
      type: string
      enum: [submitted, withdrawn, hidden]
    MediaPurpose:
      type: string
      enum: [pet_photo, emergency_photo, proof, avatar]
    MediaVisibility:
      type: string
      enum: [private, limited, public]
    MediaStatus:
      type: string
      enum: [pending, active, deleted]
    AdminTargetType:
      type: string
      enum: [user, pet, emergency, response, media]
    AdminActionType:
      type: string
      enum: [hide, restore, close, note]

    BootstrapConfigResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [regionPolicy, featureFlags, localizationVersion]
              properties:
                regionPolicy:
                  $ref: "#/components/schemas/RegionPolicy"
                featureFlags:
                  type: array
                  items:
                    $ref: "#/components/schemas/FeatureFlag"
                localizationVersion:
                  type: string
                  example: "2026-06-15"
    RegionPolicy:
      type: object
      required: [region, countryCode, mapProvider, notificationProvider, authProviders, storageRegion]
      properties:
        region:
          type: string
          example: CN
        countryCode:
          type: string
          example: CN
        mapProvider:
          type: string
          example: mock
        notificationProvider:
          type: string
          example: mock
        authProviders:
          type: array
          items:
            $ref: "#/components/schemas/AuthProvider"
        storageRegion:
          type: string
          example: cn-east-placeholder
        privacyTextVersion:
          type: string
          example: "2026-06-15"
    FeatureFlag:
